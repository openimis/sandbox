events {}

http {
    log_format postdata '$remote_addr - $host "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log;

    upstream openhim-console {
        server openhim-console:80;
    }

    upstream openhim-core {
        server openhim-core:8080;
    }

    server {
        listen 80;

        # Console UI
        location / {
            proxy_pass http://openhim-console/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # OpenHIM Core API endpoints (over HTTPS)
        location ~ ^/(heartbeat|authenticate|users|me|sessions|clients|roles|permissions|transactions|orchestrations|logs|channels|stats|status|mediators|groups|audits|visualizers|cert|validity|metrics|about|tasks)(/.*)?$ {
            proxy_pass https://openhim-core$request_uri;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass https://openhim-core/;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
