events {}

http {
    log_format postdata '$remote_addr - $host "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log;

    # Define upstreams for Console (HTTP) and Core (HTTPS)
    upstream openhim-console {
        server openhim-console:80;
    }

    upstream openhim-core {
        server openhim-core:8080;
    }

    server {
        listen 80;

        location = / {
            proxy_pass http://openhim-console;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/postdata.log postdata;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            error_page 404 = @fallback;
        }

        location = /favicon.ico {
            proxy_pass http://openhim-console/favicon.ico;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/postdata.log postdata;
        }

        location = /fonts/glyphicons-halflings-regular.woff2 {
            proxy_pass http://openhim-console/fonts/glyphicons-halflings-regular.woff2;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/postdata.log postdata;
        }

        location = /fonts/glyphicons-halflings-regular.woff {
            proxy_pass http://openhim-console/fonts/glyphicons-halflings-regular.woff;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/postdata.log postdata;
        }

        location = /fonts/glyphicons-halflings-regular.ttf {
            proxy_pass http://openhim-console/fonts/glyphicons-halflings-regular.ttf;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/postdata.log postdata;
        }

                location = /styles.css {
            proxy_pass http://openhim-console/styles.css;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/postdata.log postdata;
        }

        location = /bundle.js {
            proxy_pass http://openhim-console/bundle.js;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/postdata.log postdata;
        }

        location = /config/default.json {
            proxy_pass http://openhim-console/config/default.json;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            access_log /var/log/nginx/postdata.log postdata;
        }

        location / {
            proxy_pass https://openhim-core;
            proxy_ssl_server_name on;   # send SNI so Core’s cert matches
            proxy_ssl_verify       off; # skip self-signed cert check
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            error_page 404 = @fallback;
        }

        location @fallback {
            return 404 "Custom fallback message or handler here";
        }
    }
}